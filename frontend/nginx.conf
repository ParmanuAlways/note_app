server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — all unknown paths serve the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + status proxied to the backend service on the internal network.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
